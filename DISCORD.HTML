<style>
  .discord-card {
    background: rgba(88, 101, 242, 0.2); /* Cor do Discord com transparência */
    border: 2px solid #5865F2;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    max-width: 400px;
    margin: 20px auto;
    backdrop-filter: blur(5px); /* Efeito de vidro em cima do fundo */
  }

  .btn-discord {
    background-color: #5865F2;
    color: white;
    padding: 15px 30px;
    text-decoration: none;
    font-weight: bold;
    font-size: 20px;
    border-radius: 8px;
    display: inline-block;
    transition: 0.3s;
    /* Borda nas letras do botão */
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    border: 2px solid white;
  }

  .btn-discord:hover {
    background-color: #4752c4;
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(88, 101, 242, 0.6);
  }
</style>

<div class="discord-card">
  <h3 class="texto-borda">COMUNIDADE NO DISCORD</h3>
  <p class="texto-borda">Entre para organizar sua facção e participar dos eventos!</p>
  <br>
  <a href="https://discord.gg/GJy2Gwu2KC" target="_blank" class="btn-discord">
    UNIR-SE AO SERVIDOR
  </a>
</div>
